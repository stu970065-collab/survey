<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>問卷調查</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
    background: #f5f5f3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  .icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #f0f0ee;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.25rem;
    font-size: 28px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 2rem;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #e8e8e8;
    border-top-color: #1a1a1a;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📋</div>
  <h1>問卷調查</h1>
  <p class="subtitle">感謝您參與本研究</p>
  <div class="spinner"></div>
  <p class="msg">正在為您開啟問卷，請稍候…</p>
</div>

<script>
  var formA = "https://docs.google.com/forms/d/e/1FAIpQLSew7idCoqPyFhj_ExYAUGm3F7exQqYE49ktUqilo0FkYiijPA/viewform?usp=publish-editor";
  var formB = "https://docs.google.com/forms/d/e/1FAIpQLSeyz0zQnLdCx0kbicMPryV1ICHYHnKcd_Ubzie7m7bTIBpxqA/viewform?usp=sharing&ouid=105075769516156827986";
  var target = Math.random() < 0.5 ? formA : formB;
  setTimeout(function() {
    window.location.href = target;
  }, 800);
</script>
</body>
</html>
