<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資決策行為調查問卷</title>

<!-- OG tags for LINE / FB preview -->
<meta property="og:title" content="投資決策行為調查問卷" />
<meta property="og:description" content="本問卷為學術研究之用，旨在探討投資資訊呈現方式與個人特質對投資決策之影響。約需 5 分鐘，所有資料僅供學術統計分析使用。國立政治大學企業管理研究所" />
<meta property="og:type" content="website" />
<meta property="og:image" content="https://www.gstatic.com/images/branding/product/2x/forms_2020q4_48dp.png" />

<!-- Twitter / iMessage -->
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="投資決策行為調查問卷" />
<meta name="twitter:description" content="本問卷為學術研究之用，旨在探討投資資訊呈現方式與個人特質對投資決策之影響。約需 5 分鐘，所有資料僅供學術統計分析使用。國立政治大學企業管理研究所" />

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
    background: #f5f5f3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
  }
  .icon {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #f0f0ee;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.25rem;
    font-size: 28px;
  }
  h1 {
    font-size: 18px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 2rem;
    line-height: 1.6;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #e8e8e8;
    border-top-color: #1a1a1a;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg {
    font-size: 14px;
    color: #555;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📋</div>
  <h1>投資決策行為調查問卷</h1>
  <p class="subtitle">國立政治大學企業管理研究所<br>正在開啟問卷，請稍候…</p>
  <div class="spinner"></div>
  <p class="msg">約需 5 分鐘，感謝您撥冗填答！</p>
</div>

<script>
  var count = parseInt(localStorage.getItem('surveyCount') || '0');
  var formA = "https://docs.google.com/forms/d/e/1FAIpQLSew7idCoqPyFhj_ExYAUGm3F7exQqYE49ktUqilo0FkYiijPA/viewform?usp=publish-editor";
  var formB = "https://docs.google.com/forms/d/e/1FAIpQLSeyz0zQnLdCx0kbicMPryV1ICHYHnKcd_Ubzie7m7bTIBpxqA/viewform?usp=sharing&ouid=105075769516156827986";
  // A 比 B 多 13 份，先連續導向 B 13 次追平，之後再交替
  var target;
  if (count < 13) {
    target = formB;
  } else {
    target = ((count - 13) % 2 === 0) ? formA : formB;
  }
  localStorage.setItem('surveyCount', count + 1);
  setTimeout(function() {
    window.location.href = target;
  }, 800);
</script>
</body>
</html>
